<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Аццкая Солянка</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-fire">🔥</div>
      <h1 class="header-title">АЦЦКАЯ СОЛЯНКА</h1>
    </header>

    <!-- Navigation tabs -->
    <nav class="tabs">
      <button class="tab active" data-tab="stats" onclick="switchTab('stats')">📊 Стат</button>
      <button class="tab" data-tab="packs" onclick="switchTab('packs')">📚 Пакеты</button>
      <button class="tab" data-tab="admin" onclick="switchTab('admin')">⚙️ Админ</button>
    </nav>

    <!-- Stats tab -->
    <section id="tab-stats" class="tab-content active">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-number" id="stat-total">—</div>
          <div class="stat-label">Всего вопросов</div>
        </div>
        <div class="stat-card accent">
          <div class="stat-number" id="stat-sent">—</div>
          <div class="stat-label">Отправлено</div>
        </div>
        <div class="stat-card warning">
          <div class="stat-number" id="stat-pending">—</div>
          <div class="stat-label">Ожидает</div>
        </div>
        <div class="stat-card info">
          <div class="stat-number" id="stat-packs">—</div>
          <div class="stat-label">Пакетов</div>
        </div>
      </div>
      <div class="schedule-card">
        <div class="schedule-icon">⏰</div>
        <div>
          <div class="schedule-title">Расписание</div>
          <div class="schedule-desc">10:00 и 20:00 (Europe/Prague)</div>
          <div class="schedule-desc">4 вопроса за раз</div>
        </div>
      </div>
    </section>

    <!-- Packs tab -->
    <section id="tab-packs" class="tab-content">
      <div id="packs-list" class="packs-list">
        <div class="loading">Загрузка...</div>
      </div>
    </section>

    <!-- Admin tab -->
    <section id="tab-admin" class="tab-content">
      <div class="admin-buttons">
        <button class="btn btn-fire" onclick="sendCommand('/send_now')">
          <span class="btn-icon">🔥</span>
          <span>Отправить вопрос</span>
        </button>
        <button class="btn btn-secondary" onclick="sendCommand('/parse')">
          <span class="btn-icon">🔄</span>
          <span>Парсить Балканфест</span>
        </button>
        <button class="btn btn-secondary" onclick="sendCommand('/questions')">
          <span class="btn-icon">📚</span>
          <span>Просмотр вопросов</span>
        </button>
        <button class="btn btn-secondary" onclick="sendCommand('/status')">
          <span class="btn-icon">📊</span>
          <span>Статус</span>
        </button>
        <button class="btn btn-danger" onclick="confirmClear()">
          <span class="btn-icon">🗑</span>
          <span>Очистить базу</span>
        </button>
      </div>
    </section>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
